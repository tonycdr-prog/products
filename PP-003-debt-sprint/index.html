<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Debt Sprint UK</title><meta name="description" content="UK debt payoff calculator with snowball and avalanche options."><style>:root{--bg:#0a0f1f;--card:#121936;--txt:#ecfeff;--muted:#9fb2cf;--accent:#22c55e;--accent2:#38bdf8}body{margin:0;font-family:Inter,system-ui;background:var(--bg);color:var(--txt)}.wrap{max-width:1000px;margin:auto;padding:24px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.card{background:var(--card);border:1px solid #2a3766;border-radius:14px;padding:18px}.input{width:100%;padding:10px;border-radius:8px;border:1px solid #334155;background:#0b1226;color:#fff;margin:6px 0}.btn{background:linear-gradient(90deg,var(--accent),var(--accent2));border:0;padding:11px 15px;border-radius:9px;color:#04131d;font-weight:700;cursor:pointer}.small{color:var(--muted);font-size:14px}table{width:100%;font-size:14px}td,th{padding:4px;text-align:left}@media(max-width:800px){.grid{grid-template-columns:1fr}}</style></head><body><div class="wrap"><h1>Debt Sprint UK</h1><p class="small">Stop guessing. Enter your debts and monthly budget to get a payoff timeline and interest estimate.</p><p><strong>Pricing:</strong> Free calculator · £3/mo Pro reminders</p><div class="grid"><div class="card"><h2>Inputs</h2><textarea id="debts" class="input" rows="7" placeholder="Format: Name,Amount,APR
Card A,2500,29.9
Loan B,1800,12.5"></textarea><label>Monthly budget (£)</label><input id="budget" class="input" type="number" value="350"><label>Method</label><select id="method" class="input"><option value="snowball">Snowball (smallest first)</option><option value="avalanche">Avalanche (highest APR first)</option></select><button class="btn" onclick="calc()">Calculate plan</button><input id="email" class="input" placeholder="Email for weekly accountability"><button class="btn" onclick="wait()">Join Waitlist</button></div><div class="card"><h2>Results</h2><div id="res" class="small">Add debts and run calculation.</div></div></div></div><script>function parse(){return document.getElementById('debts').value.trim().split(/
+/).map(r=>r.split(',')).filter(r=>r.length===3).map(([n,a,apr])=>({n:n.trim(),a:+a,apr:+apr})).filter(d=>d.a>0&&d.apr>=0)}function calc(){let ds=parse(),b=+document.getElementById('budget').value,m=document.getElementById('method').value;if(!ds.length||b<=0)return alert('Enter valid debts and budget');let month=0,totalI=0;while(ds.some(d=>d.a>1)&&month<600){month++;ds.forEach(d=>{let i=d.a*(d.apr/100/12);d.a+=i;totalI+=i});ds=ds.sort((x,y)=>m==='snowball'?x.a-y.a:y.apr-x.apr);let pay=b;for(let d of ds){if(pay<=0)break;let p=Math.min(d.a,pay);d.a-=p;pay-=p}}const remain=ds.reduce((s,d)=>s+d.a,0);document.getElementById('res').innerHTML=`<p><strong>Payoff time:</strong> ${month} months</p><p><strong>Estimated interest:</strong> £${totalI.toFixed(0)}</p><p><strong>Remaining balance after simulation:</strong> £${remain.toFixed(2)}</p><p class='small'>This is an estimate, not regulated financial advice.</p>`}function wait(){const e=document.getElementById('email').value;if(!e.includes('@'))return alert('Enter valid email');localStorage.setItem('debt_waitlist',e);alert('Saved locally. Connect to email provider later.');}</script></body></html>
