<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Invoice Rescue — stop losing money to late invoices</title><meta name="description" content="Calculate profitable freelance invoice rates, late fees, and payment terms instantly."><style>
body{font-family:Inter,system-ui;background:#EEF2FF;color:#312E81;margin:0} .wrap{max-width:980px;margin:auto;padding:24px}
.hero{background:#fff;border:1px solid #C7D2FE;border-radius:16px;padding:24px} h1{font-size:2rem;margin:.2rem 0}.cta{background:#6366F1;color:#fff;border:0;padding:12px 16px;border-radius:10px;font-weight:700}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-top:14px} input,select{width:100%;padding:10px;border:1px solid #C7D2FE;border-radius:8px}
.card{background:#fff;border:1px solid #C7D2FE;border-radius:12px;padding:14px;margin-top:14px} .price{font-weight:800;color:#16A34A}
</style></head><body><div class="wrap"><div class="hero"><h1>Invoice Rescue</h1><p>Turn project scope into sane pricing + automatic late fee policy in under 60 seconds.</p><div class="grid"><div><label>Target monthly income (£)</label><input id="income" type="number" value="5000"></div><div><label>Billable hours / month</label><input id="hours" type="number" value="100"></div><div><label>Admin overhead (%)</label><input id="overhead" type="number" value="20"></div><div><label>Late fee (%)</label><input id="late" type="number" value="8"></div></div><p><button class="cta" onclick="calc()">Generate pricing + terms</button></p><div id="out" class="card" aria-live="polite"></div></div>
<div class="card"><h2>Pricing</h2><p><strong>Starter £9/mo</strong> · 20 invoices</p><p><strong>Pro £29/mo</strong> · unlimited + reminders + Stripe export</p><p><strong>Agency £79/mo</strong> · team + branded templates</p><button class="cta">Start free</button></div>
<div class="card"><h2>Join waitlist</h2><input id="email" placeholder="you@studio.co"><button class="cta" onclick="join()">Get early access</button><p id="wl"></p></div></div>
<script>function calc(){const i=+income.value,h=+hours.value,o=+overhead.value/100,l=+late.value/100;const rate=(i/h)*(1+o);const day=rate*6;const late=day*l;out.innerHTML=`<h3>Recommended rate: <span class=price>£${rate.toFixed(2)}/hr</span></h3><p>Day rate: £${day.toFixed(0)} · Late fee after 14 days: £${late.toFixed(2)} per invoice-day overdue.</p><p><strong>Suggested clause:</strong> "Invoices due in 14 days. Statutory/contractual late fee ${(+late.value).toFixed(0)}% applies after due date."</p>`} calc();function join(){const e=email.value.trim();if(!/.+@.+\..+/.test(e)){wl.textContent='Enter a valid email';return;}localStorage.setItem('pp1_waitlist',e);wl.textContent='Saved. We'll notify launch.';}</script></body></html>
