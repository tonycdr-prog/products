<!doctype html><html><head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>LeanInvoice — Send & chase invoices</title><meta name='description' content='Minimal invoicing with auto reminders for freelancers.'><style>body{font-family:Inter,system-ui;background:#0b1020;color:#e2e8f0;margin:0}.w{max-width:960px;margin:auto;padding:24px}.c{background:#131a2b;border:1px solid #334155;border-radius:14px;padding:20px;margin:12px 0}label{display:block;margin-top:8px}input,button{width:100%;padding:11px;border-radius:10px;border:1px solid #475569;font-size:16px}button{background:#22c55e;border:none;color:#062012;cursor:pointer;font-weight:700}table{width:100%;border-collapse:collapse}td,th{padding:8px;border-bottom:1px solid #334155}    a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible { outline: 3px solid #2563eb; outline-offset: 2px; }
    html { overflow-x: hidden; }
</style></head><body><div class='w'><div class='c'><h1>LeanInvoice</h1><p>Create an invoice and auto-schedule reminders in one flow.</p><label>Client</label><input id='client'><label>Amount (£)</label><input id='amt' type='number'><label>Due in days</label><input id='due' type='number' value='14'><button id='add'>Create Invoice</button></div><div class='c'><h2>Invoice Queue</h2><table><thead><tr><th>Client</th><th>Amount</th><th>Due</th><th>Status</th></tr></thead><tbody id='rows'></tbody></table></div><div class='c'><h2>Pricing</h2><p>£8/month solo, £19/month studio. Stripe-ready checkout link placeholder.</p><button>Start free trial</button></div><div class='c'><h2>Waitlist</h2><input id='email' type='email' placeholder='you@example.com'><button id='join'>Join Waitlist</button><p id='msg'></p></div></div><script>const invoices=[];const fmt=d=>new Date(d).toLocaleDateString('en-GB');add.onclick=()=>{const c=client.value.trim(),a=+amt.value,days=+due.value||14;if(!c||!a)return;const d=new Date(Date.now()+days*86400000);invoices.push({c,a,d,status:'Scheduled reminders'});rows.innerHTML=invoices.map(i=>`<tr><td>${i.c}</td><td>£${i.a.toFixed(2)}</td><td>${fmt(i.d)}</td><td>${i.status}</td></tr>`).join('');};join.onclick=()=>{msg.textContent=/@/.test(email.value)?'Thanks — beta invite queued.':'Enter valid email';};</script></body></html>
