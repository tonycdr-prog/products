<!doctype html><html><head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>OutboundOne — Sequence Builder</title><meta name='description' content='Create simple outbound sequences and track reply rates.'><style>body{font-family:Inter,Arial;background:#f1f5f9;color:#0f172a;margin:0}.w{max-width:980px;margin:auto;padding:24px}.card{background:#fff;border:1px solid #cbd5e1;border-radius:14px;padding:20px;margin:14px 0}textarea,input,button{width:100%;padding:10px;border:1px solid #94a3b8;border-radius:10px;font-size:16px}button{background:#7c3aed;color:#fff;border:none;cursor:pointer} .kpi{display:grid;grid-template-columns:repeat(3,1fr);gap:10px} .kpi div{background:#eef2ff;padding:12px;border-radius:10px} @media(max-width:760px){.kpi{grid-template-columns:1fr}}</style></head><body><div class='w'><section class='card'><h1>OutboundOne</h1><p>One place to draft sequence steps, set cadence, and estimate expected replies.</p><label>Lead count</label><input id='leads' type='number' value='200'><label>Expected open rate (%)</label><input id='open' type='number' value='55'><label>Expected reply rate (%)</label><input id='reply' type='number' value='6'><button id='run'>Forecast campaign</button></section><section class='card'><div class='kpi'><div><strong id='k1'>0</strong><br>opens</div><div><strong id='k2'>0</strong><br>replies</div><div><strong id='k3'>0</strong><br>meetings (30% of replies)</div></div></section><section class='card'><h2>Sequence Wizard</h2><textarea id='seq' rows='5'>Day 1: Intro\nDay 3: Case study\nDay 7: Breakup email</textarea><button onclick='alert("Sequence saved locally")'>Save sequence</button></section><section class='card'><h2>Pricing</h2><p>£30/mo starter, £79/mo team. Stripe checkout ready.</p><button>Start trial</button></section><section class='card'><h2>Email waitlist</h2><input id='email' type='email'><button id='join'>Join waitlist</button><p id='msg'></p></section></div><script>run.onclick=()=>{const l=+leads.value||0,o=(+open.value||0)/100,r=(+reply.value||0)/100;const opens=Math.round(l*o),replies=Math.round(l*r),meet=Math.round(replies*0.3);k1.textContent=opens;k2.textContent=replies;k3.textContent=meet};join.onclick=()=>msg.textContent=/@/.test(email.value)?'Added to launch list':'Invalid email';</script></body></html>
