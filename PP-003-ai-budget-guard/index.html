<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>AI Budget Guard</title><meta name='description' content='Problem-specific MVP for PP-003-ai-budget-guard.'><style>@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');body{font-family:'Plus Jakarta Sans',sans-serif;background:#FDF2F8;color:#831843;margin:0}main{max-width:900px;margin:32px auto;padding:24px}.card{background:#fff;border:1px solid #FBCFE8;border-radius:14px;padding:18px;margin:14px 0}.btn{background:#DB2777;color:#fff;border:0;padding:10px 14px;border-radius:10px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}input,select{width:100%;padding:8px;margin:4px 0;border:1px solid #FBCFE8;border-radius:8px}@media(max-width:720px){.grid{grid-template-columns:1fr}}    a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible { outline: 3px solid #2563eb; outline-offset: 2px; }
    html { overflow-x: hidden; }
</style></head><body><main><h1>AI Budget Guard</h1><p>Problem-specific MVP for PP-003-ai-budget-guard.</p><div class='card'><h2>Core Tool</h2><div class='grid'><input id='a' type='number' placeholder='Monthly units'><input id='b' type='number' placeholder='Cost per unit (£)'></div><button class='btn' onclick='calc()'>Run</button><p id='out'></p></div><div class='card'><h2>Pricing</h2><p>Starter £5/mo · Pro £19/mo · Team £79/mo</p><button class='btn'>Start free</button></div><div class='card'><h2>Join waitlist</h2><input id='email' type='email' placeholder='you@company.com'><button class='btn' onclick='join()'>Join</button><p id='msg'></p></div></main><script>function calc(){const a=+document.getElementById('a').value||0;const b=+document.getElementById('b').value||0;document.getElementById('out').textContent=`Estimated monthly impact: £${(a*b).toFixed(2)}`;}function join(){const e=document.getElementById('email').value;document.getElementById('msg').textContent=e.includes('@')?'Saved locally for export.':'Enter valid email.';}</script></body></html>
