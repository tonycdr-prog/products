<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products — tonycdr-prog</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0d0d0d; color: #e5e5e5; padding: 2rem; }
    h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 0.25rem; }
    p.sub { color: #666; font-size: 0.85rem; margin-bottom: 2rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; }
    .card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 1.25rem; text-decoration: none; color: inherit; display: block; transition: border-color 0.15s; }
    .card:hover { border-color: #555; }
    .card h2 { font-size: 1rem; margin-bottom: 0.4rem; }
    .card p { font-size: 0.8rem; color: #888; }
    .empty { color: #555; font-size: 0.9rem; }
  </style>
</head>
<body>
  <h1>Products</h1>
  <p class="sub">Autonomous builds — shipped nightly by the Scout.</p>
  <div class="grid" id="grid">
    <p class="empty">No builds deployed yet.</p>
  </div>
</body>
</html>
