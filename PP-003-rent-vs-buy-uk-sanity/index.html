<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Rent vs Buy UK Sanity</title><meta name="description" content="UK-focused rent vs buy decision tool with stamp duty and fees."><style>body{font-family:Inter,system-ui;background:#F8FAFC;color:#0f172a}.wrap{max-width:950px;margin:auto;padding:22px}.hero,.card{background:#fff;border:1px solid #dbeafe;border-radius:14px;padding:16px;margin-bottom:12px}.btn{background:#1D4ED8;color:#fff;border:0;padding:10px 14px;border-radius:8px;font-weight:700}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}input{padding:9px;border:1px solid #93c5fd;border-radius:8px;width:100%}.big{font-size:1.3rem;font-weight:800}    a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible { outline: 3px solid #2563eb; outline-offset: 2px; }
    html { overflow-x: hidden; }
</style></head><body><div class="wrap"><div class="hero"><h1>Rent vs Buy UK Sanity</h1><p>Quickly compare 5-year housing cost using UK assumptions (stamp duty + maintenance).</p><div class="grid"><div><label>Monthly rent (£)</label><input id="rent" type="number" value="1750"></div><div><label>House price (£)</label><input id="price" type="number" value="500000"></div><div><label>Deposit (£)</label><input id="deposit" type="number" value="100000"></div><div><label>Mortgage APR (%)</label><input id="apr" type="number" value="5.2"></div></div><p><button class="btn" onclick="calc()">Compare 5-year cost</button></p><div id="out" class="card" aria-live="polite"></div></div><div class="card"><h2>Pricing</h2><p>Free calculator, Pro scenarios £5/mo, Broker mode £29/mo.</p><button class="btn">Get Pro</button></div><div class="card"><h2>Waitlist</h2><input id="email" placeholder="you@email.com"><button class="btn" onclick="join()">Join waitlist</button><p id="wl"></p></div></div><script>
function stampDuty(p){if(p<=250000)return 0; if(p<=925000)return (p-250000)*0.05; return (925000-250000)*0.05+(p-925000)*0.1;}
function calc(){const r=+rent.value*60;const p=+price.value,d=+deposit.value,a=+apr.value/100/12;const loan=p-d;const n=25*12;const m=(loan*a)/(1-Math.pow(1+a,-n));const mort5=m*60;const fees=stampDuty(p)+p*0.01+p*0.01;const buy5=mort5+fees;const diff=buy5-r;out.innerHTML=`<p class='big'>${diff>0?'Renting cheaper':'Buying cheaper'} by £${Math.abs(diff).toFixed(0)} over 5 years</p><p>Rent total: £${r.toFixed(0)} | Buy 5y cash out: £${buy5.toFixed(0)} (incl. stamp duty + legal + maintenance).</p>`}
calc(); function join(){const e=email.value.trim(); if(!/.+@.+\..+/.test(e)){wl.textContent='Enter valid email';return;} localStorage.setItem('pp3_waitlist',e); wl.textContent='Saved.';}
</script></body></html>
