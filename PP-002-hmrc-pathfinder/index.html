<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>HMRC Pathfinder</title><meta name="description" content="Guided HMRC issue triage and action-plan builder for UK taxpayers and freelancers."><style>:root{--bg:#0b1020;--card:#121a2f;--txt:#eef2ff;--muted:#a9b4d0;--accent:#5eead4;--accent2:#60a5fa}*{box-sizing:border-box}body{margin:0;font-family:Inter,Segoe UI,system-ui;background:linear-gradient(160deg,#0b1020,#111827);color:var(--txt)}.wrap{max-width:980px;margin:auto;padding:24px}.hero{padding:40px 0}.grid{display:grid;gap:16px;grid-template-columns:1fr 1fr}.card{background:var(--card);padding:20px;border-radius:14px;border:1px solid #273353}.cta{background:linear-gradient(90deg,var(--accent2),var(--accent));color:#041019;padding:12px 16px;border:0;border-radius:10px;font-weight:700;cursor:pointer}.input,select{width:100%;padding:10px;border-radius:8px;border:1px solid #334155;background:#0f172a;color:white;margin:6px 0 12px}.small{color:var(--muted);font-size:14px}ul{line-height:1.6}@media(max-width:800px){.grid{grid-template-columns:1fr}}    a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible { outline: 3px solid #2563eb; outline-offset: 2px; }
    html { overflow-x: hidden; }
</style></head><body><div class="wrap"><section class="hero"><h1>HMRC Pathfinder</h1><p class="small">Resolve HMRC issues without guesswork. Generate a personalised action plan, evidence checklist, and call script.</p><p><strong>Pricing:</strong> £15/mo Solo · £49/mo Accountant</p></section><section class="grid"><div class="card"><h2>Issue Wizard</h2><label>Issue type</label><select id="issue"><option>Incorrect tax bill</option><option>PAYE mismatch</option><option>Self Assessment penalty</option><option>VAT registration query</option></select><label>Urgency</label><select id="urgency"><option>Need response this week</option><option>Can wait 2-4 weeks</option></select><label>You are</label><select id="persona"><option>Individual taxpayer</option><option>Freelancer/sole trader</option><option>Small business director</option></select><button class="cta" onclick="buildPlan()">Generate plan</button><p class="small">CTA: Join waitlist for beta concierge support.</p><input class="input" id="email" placeholder="Email for beta access"><button class="cta" onclick="joinWaitlist()">Join Waitlist</button></div><div class="card"><h2>Your Action Plan</h2><div id="out" class="small">Fill the wizard and generate your plan.</div></div></section></div><script>function esc(s){return s.replace(/[<>&]/g,m=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[m]))}function buildPlan(){const issue=document.getElementById('issue').value,urg=document.getElementById('urgency').value,persona=document.getElementById('persona').value;const steps=[`1) Confirm your case category: ${issue}.`,`2) Collect evidence: HMRC letters, P60/P45, payslips, invoices, prior returns.`,`3) Draft a 6-line case summary with dates and amounts.`,`4) Use call script: "I'm calling about ${issue}; I have evidence and need next action + reference number."`,`5) If unresolved, escalate via formal complaint and track response SLA.`];if(urg.includes('week'))steps.splice(1,0,'Priority: call as lines open, capture adviser name + case reference.');document.getElementById('out').innerHTML=`<p><strong>Profile:</strong> ${esc(persona)} · ${esc(urg)}</p><ul>${steps.map(s=>`<li>${esc(s)}</li>`).join('')}</ul><p><strong>Suggested product action:</strong> store case timeline + reminders.</p>`;}function joinWaitlist(){const e=document.getElementById('email').value.trim();if(!e.includes('@')) return alert('Enter valid email');localStorage.setItem('hmrc_waitlist',e);alert('Saved locally. Hook this to your email backend/Stripe checkout next.');}</script></body></html>
