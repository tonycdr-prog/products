<!doctype html><html><head>
  <meta name="viewport" content="width=device-width, initial-scale=1"><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>CertPilot UK — Landlord Compliance Tracker</title><meta name='description' content='Track UK landlord compliance deadlines for Gas Safety, EICR, EPC and avoid fines.'><style>body{font-family:Inter,Arial;background:#f6f8fc;color:#10203a;margin:0}.wrap{max-width:980px;margin:auto;padding:28px}.card{background:#fff;border:1px solid #dbe4ff;border-radius:14px;padding:18px;margin:14px 0}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}label{font-size:.9rem}input,button{width:100%;padding:10px;border-radius:10px;border:1px solid #bdd0ff}button{background:#2356d8;color:white;font-weight:700;border:none} .risk{font-weight:700}@media(max-width:760px){.grid{grid-template-columns:1fr}}</style></head><body><div class='wrap'><h1>Never Miss a UK Compliance Renewal</h1><p>Track Gas Safety (CP12), EICR and EPC dates. Get alert windows at 90/30/14/7 days.</p><div class='card'><div class='grid'><div><label>Gas Safety expiry</label><input id='gas' type='date'></div><div><label>EICR expiry</label><input id='eicr' type='date'></div></div><div class='grid'><div><label>EPC expiry</label><input id='epc' type='date'></div><div><label>Insurance renewal</label><input id='ins' type='date'></div></div><button onclick='check()'>Run compliance check</button><pre id='result'></pre></div><div class='grid'><div class='card'><h3>Pricing</h3><p>Solo landlord: <b>£5/mo</b><br>Portfolio (up to 20): <b>£19/mo</b><br>Agent: <b>£59/mo</b></p><button>Start 7-day free trial</button></div><div class='card'><h3>Waitlist</h3><input id='email' placeholder='landlord@email.com'><button onclick='join()'>Get early access</button><p id='msg'></p></div></div></div><script>
function daysLeft(date){if(!date) return null; return Math.ceil((new Date(date)-new Date())/86400000)}
function band(d){if(d===null)return 'Missing'; if(d<0)return 'EXPIRED'; if(d<=7)return 'CRITICAL'; if(d<=30)return 'High'; if(d<=90)return 'Warning'; return 'OK'}
function check(){const items=[['Gas',gas.value],['EICR',eicr.value],['EPC',epc.value],['Insurance',ins.value]];let out='';for(const [n,v] of items){const d=daysLeft(v);out+=`${n}: ${band(d)} (${d===null?'no date':d+' days'})\n`; }result.textContent=out;}
function join(){const e=document.getElementById('email').value.trim();if(!e.includes('@')) return msg.textContent='Enter valid email';localStorage.setItem('waitlist_certpilot',e);msg.textContent='Saved locally (MVP mode).';}
</script></body></html>
