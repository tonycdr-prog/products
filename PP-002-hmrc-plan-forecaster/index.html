<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>HMRC Plan Forecaster</title><meta name="description" content="Model HMRC debt repayment scenarios for UK sole traders."><style>body{font-family:Inter,Arial,sans-serif;background:#f1f5f9;color:#111827;margin:0}.wrap{max-width:960px;margin:auto;padding:24px}.card{background:#fff;padding:20px;border-radius:16px;box-shadow:0 8px 24px rgba(2,6,23,.08);margin-bottom:16px}input,button{padding:10px;border-radius:10px;border:1px solid #cbd5e1}button{background:#0ea5e9;color:#fff;border:none}h1{margin-top:0}.result{font-weight:700;color:#0369a1}    a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible { outline: 3px solid #2563eb; outline-offset: 2px; }
    html { overflow-x: hidden; }
</style></head><body><div class="wrap"><div class="card"><h1>Avoid HMRC panic: plan repayments before calling</h1><p>Built for UK sole traders with surprise tax bills. Test monthly payment plans + interest assumptions.</p><p><strong>£29/mo</strong> includes scenario exports + accountant share link.</p></div><div class="card"><h2>Repayment calculator</h2><p><input id="debt" type="number" placeholder="Tax debt (£)"> <input id="apr" type="number" step="0.1" placeholder="APR % (e.g. 7.5)"> <input id="months" type="number" placeholder="Months"> <button onclick="calc()">Calculate</button></p><p class="result" id="out"></p><p id="table"></p></div><div class="card"><h3>Waitlist</h3><input id="email" placeholder="you@company.com"><button onclick="join()">Get beta invite</button><p id="msg"></p></div></div><script>function calc(){const D=+debt.value||0,r=(+apr.value||0)/1200,n=+months.value||1;if(D<=0||n<1){out.textContent='Enter valid values';return}const p=r?D*(r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1):D/n;const total=p*n;out.textContent=`Estimated monthly payment: £${p.toFixed(2)} | Total repaid: £${total.toFixed(2)}`;table.textContent=`Interest cost: £${(total-D).toFixed(2)}`}function join(){const e=email.value.trim();if(!/.+@.+\..+/.test(e)){msg.textContent='Invalid email';return}const k='hmrc_waitlist';const arr=JSON.parse(localStorage.getItem(k)||'[]');arr.push({e,at:new Date().toISOString()});localStorage.setItem(k,JSON.stringify(arr));msg.textContent='Saved locally. Connect to ESP webhook.'}</script></body></html>
