<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>BlockCare Escalator</title><meta name="description" content="Track building outages and generate leaseholder escalation letters."><style>body{font-family:Inter,Arial,sans-serif;background:#f8fafc;color:#0f172a;margin:0}.wrap{max-width:980px;margin:auto;padding:24px}.card{background:#fff;border-radius:16px;padding:18px;box-shadow:0 8px 20px rgba(15,23,42,.08);margin-bottom:14px}input,select,textarea,button{padding:10px;border-radius:10px;border:1px solid #cbd5e1;width:100%;margin:6px 0}button{background:#16a34a;color:#fff;border:none}pre{white-space:pre-wrap;background:#f1f5f9;padding:12px;border-radius:10px} .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}@media(max-width:700px){.grid{grid-template-columns:1fr}}    a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible { outline: 3px solid #2563eb; outline-offset: 2px; }
    html { overflow-x: hidden; }
</style></head><body><div class="wrap"><div class="card"><h1>When lifts fail, evidence wins</h1><p>Log incidents, calculate outage days, generate a ready-to-send escalation letter to your managing agent/freeholder.</p><p><strong>£39/mo</strong> for residents associations • <strong>£99/mo</strong> for managing agents.</p></div><div class="card"><h2>Incident logger</h2><div class="grid"><input id="building" placeholder="Building name"><select id="type"><option>Lift outage</option><option>Heating outage</option><option>Water outage</option></select><input id="start" type="date"><input id="end" type="date"></div><textarea id="impact" placeholder="Who was affected? e.g. wheelchair users unable to leave flat"></textarea><button onclick="generate()">Generate escalation draft</button><pre id="letter"></pre></div><div class="card"><h3>Waitlist</h3><input id="email" placeholder="committee@email.com"><button onclick="join()">Join pilot</button><p id="msg"></p></div></div><script>function days(a,b){return Math.max(1,Math.ceil((new Date(b)-new Date(a))/86400000)+1)}function esc(s){return s.replace(/[<>]/g,'')}function generate(){if(!building.value||!start.value||!end.value){letter.textContent='Please complete building + dates';return}const d=days(start.value,end.value);letter.textContent=`Subject: Formal escalation – ${esc(type.value)} at ${esc(building.value)}

Dear Managing Agent,

We are formally escalating a ${esc(type.value).toLowerCase()} at ${esc(building.value)} lasting ${d} day(s), from ${start.value} to ${end.value}.

Resident impact:
${esc(impact.value||'Not specified')}

Please confirm: (1) root cause, (2) repair ETA, (3) interim support, (4) compensation/redress process.

Regards,
Residents' Committee`;}
function join(){const e=email.value.trim();if(!/.+@.+\..+/.test(e)){msg.textContent='Invalid email';return}let arr=JSON.parse(localStorage.getItem('blockcare_waitlist')||'[]');arr.push({e,ts:new Date().toISOString()});localStorage.setItem('blockcare_waitlist',JSON.stringify(arr));msg.textContent='Saved locally.'}</script></body></html>
