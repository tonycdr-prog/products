<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Flaky Radar</title><meta name="description" content="Upload test results CSV and get flaky score ranking."><style>body{font-family:IBM Plex Sans,Arial;background:#0F172A;color:#F8FAFC;margin:0}.wrap{max-width:920px;margin:auto;padding:32px}.card{background:#1B2336;border:1px solid #475569;border-radius:12px;padding:20px;margin:16px 0}input,button,textarea{padding:10px;border-radius:8px;border:1px solid #475569}button{background:#22C55E;color:#0F172A;font-weight:700}h1{font-family:'JetBrains Mono',monospace}label{display:block;margin:8px 0}    a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible { outline: 3px solid #2563eb; outline-offset: 2px; }
    html { overflow-x: hidden; }
</style></head><body><div class='wrap'><h1>Flaky Radar</h1><p>Upload test results CSV and get flaky score ranking.</p><div class='card'><h2>Core Tool</h2><label>Input</label><textarea id='in' rows='6' style='width:100%'></textarea><button onclick='run()'>Run</button><pre id='out'></pre></div><div class='card'><h2>Pricing</h2><p>Starter £9/mo · Pro £29/mo · Agency £99/mo</p><button>Start Free Trial</button></div><div class='card'><h2>Waitlist</h2><input id='email' placeholder='you@company.com'><button onclick='join()'>Join Waitlist</button><p id='msg'></p></div></div><script>function run(){const t=document.getElementById('in').value;let o='';if('PP-003-flaky-radar'.includes('landlord')){const dates=(t.match(/\d{4}-\d{2}-\d{2}/g)||[]);o='Found '+dates.length+' expiry dates. Reminders: '+dates.map(d=>new Date(d).toDateString()).join(', ');} else if('PP-003-flaky-radar'.includes('api-truth')){o=t.includes('curl')?'Looks like executable API snippet. Add schema check next.':'Paste curl/http snippet to validate.';} else {const lines=t.trim().split('
').filter(Boolean);const map={};for(const l of lines){const [test,status]=l.split(',');if(!test||!status)continue;map[test]=map[test]||[];map[test].push(status.trim());}let arr=Object.entries(map).map(([k,v])=>{let flips=0;for(let i=1;i<v.length;i++)if(v[i]!=v[i-1])flips++;return [k,flips/(Math.max(v.length-1,1))];}).sort((a,b)=>b[1]-a[1]);o=arr.slice(0,10).map(x=>x[0]+': '+x[1].toFixed(2)).join('
');}document.getElementById('out').textContent=o;} function join(){document.getElementById('msg').textContent='Thanks — saved locally for demo.';}</script></body></html>
